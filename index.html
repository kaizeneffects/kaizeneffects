<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kaizen Effects</title>

<style>
:root {
    --bg: #000000;
    --text: #f5f5f5;
    --accent: #b08a4a;
    --secondary: #666666;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: Inter, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    text-align: center;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeIn 2.5s ease-out forwards;
    padding: 2rem;
}

h1 {
    font-size: clamp(2.5rem, 7vw, 5rem);
    font-weight: 300;
    letter-spacing: 0.18em;
    margin-bottom: 1rem;
}

.subtitle {
    color: var(--accent);
    font-size: clamp(0.9rem, 2vw, 1.2rem);
    font-weight: 300;
    letter-spacing: 0.5em;
    text-transform: uppercase;
}

.instagram {
    display: inline-block;
    margin-top: 4rem;
    color: var(--secondary);
    text-decoration: none;
    font-size: 0.9rem;
    letter-spacing: 0.2em;
    transition: color 0.3s ease;
}

.instagram:hover {
    color: var(--accent);
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>
<div class="container">
    <h1>KAIZEN EFFECTS</h1>
    <p class="subtitle">coming soon</p>

    <a
        class="instagram"
        href="https://www.instagram.com/kaizeneffects"
        target="_blank"
        rel="noopener noreferrer"
    >
        @kaizeneffects
    </a>
</div>
</body>
</html>
